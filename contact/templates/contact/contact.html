{% extends "base.html" %}

{% block title %}Liên hệ{% endblock %}

{% block content %}
<div class="container my-5">
    <h1 class="mb-4">Liên hệ với chúng tôi</h1>

    {% if success %}
        <div class="alert alert-success">
            Gửi thành công!
        </div>
    {% endif %}

    <div class="row">
        <div class="col-md-6">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Gửi</button>
            </form>
        </div>

        <div class="col-md-6">
            <iframe 
                src="https://www.google.com/maps?q=Hanoi&output=embed"
                width="100%" height="400" style="border:0;">
            </iframe>
        </div>
    </div>
</div>
{% endblock %}
