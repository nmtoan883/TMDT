{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Đăng nhập{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="glass-card p-5 animate-up">
                <h2 class="text-center fw-bold mb-4">Chào mừng trở lại</h2>
                <p class="text-center text-muted mb-5">Đăng nhập để quản lý đơn hàng và giỏ hàng của bạn.</p>
                
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <input type="hidden" name="next" value="{{ next }}">
                    <button type="submit" class="btn btn-primary w-100 py-3 mt-3">ĐĂNG NHẬP</button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-muted">Chưa có tài khoản? <a href="#" class="text-primary text-decoration-none fw-bold">Đăng ký ngay</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
