{% extends "base.html" %}

{% block title %}Email đã được gửi - E-ELECTRO{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5 text-center">
            <div class="glass-card p-5 animate-up">
                <i class="fas fa-check-circle fa-4x text-success mb-4"></i>
                <h2 class="fw-bold">Kiểm tra hộp thư của bạn!</h2>
                <p class="text-muted mt-3">
                    Chúng tôi đã gửi email hướng dẫn đặt lại mật khẩu đến địa chỉ email bạn cung cấp.
                    Vui lòng kiểm tra hộp thư đến (kể cả mục Spam).
                </p>
                <a href="{% url 'account_login' %}" class="btn btn-primary mt-4">
                    <i class="fas fa-arrow-left me-2"></i>Quay lại đăng nhập
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
