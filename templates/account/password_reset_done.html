<!DOCTYPE html>

<head>

  <link rel="stylesheet" crossorigin href="{% static 'inapp_assets/css/main.css' %}">

<body>

<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card" style="max-width:420px; width:100%;">
    <div class="card-body p-5 text-center">
      <div class="mb-4">

      <h2 class="h4 fw-bold mb-3">Đã gửi Link Khôi phục</h2>

        Vui lòng kiểm tra <strong>Hộp Thư Đầu (Inbox)</strong> hoặc <strong>Thư Rác (Spam)</strong> trong Email của bạn.
      </p>

      <a href="{% url 'account_login' %}" class="btn btn-outline-primary w-100 mt-2">
        Quay lại trang Đăng nhập
      </a>
    </div>
  </div>
