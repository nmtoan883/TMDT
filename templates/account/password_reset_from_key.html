{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Đặt lại mật khẩu - E-ELECTRO{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="glass-card p-5 animate-up">
                <div class="text-center mb-4">
                    <i class="fas fa-key fa-3x text-primary mb-3"></i>
                    <h2 class="fw-bold">Đặt mật khẩu mới</h2>
                    <p class="text-muted">Nhập mật khẩu mới cho tài khoản của bạn.</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold mt-3">
                        <i class="fas fa-check me-2"></i>XÁC NHẬN MẬT KHẨU MỚI
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
