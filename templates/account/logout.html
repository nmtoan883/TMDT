{% extends "base.html" %}

{% block title %}Đăng xuất - E-ELECTRO{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5 text-center">
            <div class="glass-card p-5 animate-up">
                <i class="fas fa-sign-out-alt fa-4x text-primary mb-4"></i>
                <h2 class="fw-bold mb-3">Bạn muốn đăng xuất?</h2>
                <p class="text-muted">Nhấn xác nhận để đăng xuất khỏi tài khoản của bạn.</p>
                <form method="post" action="{% url 'account_logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-5 py-3 fw-bold mt-3">
                        <i class="fas fa-sign-out-alt me-2"></i>Xác nhận đăng xuất
                    </button>
                </form>
                <a href="/" class="btn btn-outline-secondary px-5 py-3 fw-bold mt-3 ms-2">
                    <i class="fas fa-arrow-left me-2"></i>Quay lại
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
