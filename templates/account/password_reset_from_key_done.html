{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Khôi phục thành công - E-Electro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="apple-touch-icon" sizes="180x180" href="{% static 'inapp_assets/images/apple-touch-icon.png' %}">
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'inapp_assets/images/favicon-32x32.png' %}">
  <link rel="icon" type="image/png" sizes="16x16" href="{% static 'inapp_assets/images/favicon-16x16.png' %}">
  <link rel="stylesheet" crossorigin href="{% static 'inapp_assets/css/main.css' %}">
</head>

<body>

<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card" style="max-width:420px; width:100%;">
    <div class="card-body p-5 text-center">
      <div class="mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#28a745" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
      </div>
      <h2 class="h4 fw-bold mb-3 text-success">Khôi phục Thành công!</h2>
      <p class="text-muted small mb-4">
        Mật khẩu của bạn đã được thay đổi thành công. Bạn hiện tại đã có thể truy cập bằng Mật khẩu mới.
      </p>

      <a href="{% url 'account_login' %}" class="btn btn-primary w-100 mt-2">
        Đăng nhập ngay
      </a>
    </div>
  </div>
</div>

</body>
</html>
