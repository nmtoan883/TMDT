{% extends "base.html" %}

{% block title %}Đặt lại mật khẩu thành công - E-ELECTRO{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5 text-center">
            <div class="glass-card p-5 animate-up">
                <i class="fas fa-check-circle fa-4x text-success mb-4"></i>
                <h2 class="fw-bold">Mật khẩu đã được đặt lại!</h2>
                <p class="text-muted mt-3">
                    Mật khẩu mới của bạn đã được lưu thành công.
                    Hãy đăng nhập bằng mật khẩu mới nhé.
                </p>
                <a href="{% url 'account_login' %}" class="btn btn-primary px-5 py-3 mt-4 fw-bold">
                    <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập ngay
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
