{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Signup - InApp Inventory Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
   <link rel="apple-touch-icon" sizes="180x180" href="/static/inapp_assets/images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/inapp_assets/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/inapp_assets/images/favicon-16x16.png">
  <link rel="manifest" href="/static/inapp_assets/site.webmanifest">

  <script type="module" crossorigin src="/static/inapp_assets/js/main.js"></script>
  <link rel="stylesheet" crossorigin href="/static/inapp_assets/css/main.css">
</head>

<body>


<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card " style="max-width:420px; width:100%;">
    <div class="card-body p-5">
      <div class="text-center mb-3">
     <a href="{% url 'shop:product_list' %}" class="mb-4 d-inline-block"><img src="data:image/svg+xml,%3csvg%20width='62'%20height='67'%20viewBox='0%200%2062%2067'%20fill='none'%20xmlns='http://www.w3.org/2000/svg'%3e%3cpath%20d='M30.604%2066.378L0.00805664%2048.1582V35.7825L30.604%2054.0023V66.378Z'%20fill='%23302C4D'/%3e%3cpath%20d='M61.1996%2048.1582L30.604%2066.378V54.0023L61.1996%2035.7825V48.1582Z'%20fill='%23E66239'/%3e%3cpath%20d='M30.5955%200L0%2018.2198V30.5955L30.5955%2012.3757V0Z'%20fill='%23657E92'/%3e%3cpath%20d='M61.191%2018.2198L30.5955%200V12.3757L61.191%2030.5955V18.2198Z'%20fill='%23A3B2BE'/%3e%3cpath%20d='M30.604%2048.8457L0.00805664%2030.6259V18.2498L30.604%2036.47V48.8457Z'%20fill='%23302C4D'/%3e%3cpath%20d='M61.1996%2030.6259L30.604%2048.8457V36.47L61.1996%2018.2498V30.6259Z'%20fill='%23E66239'/%3e%3c/svg%3e" alt="" width="36">
      <span class="ms-2"> <img src="/static/inapp_assets/images/logo.svg" alt=""></span>
      </a>
        <h1 class="card-title mb-5 h5">Create your account</h1>

      </div>

      <form action="{% url 'account_signup' %}" method="post" class="needs-validation mt-3" novalidate>
        {% csrf_token %}
        {% if form.errors %}
          <div class="alert alert-danger p-2 small mb-3 text-center rounded">
            Đăng ký thất bại! Vui lòng kiểm tra lại thông tin.
          </div>
        {% endif %}

        {{ form|crispy }}

        <button class="btn btn-primary w-100 mt-4" type="submit">Sign up</button>
      </form>

      <div class="text-center mt-3 small text-muted">
        Already have an account? <a href="{% url 'account_login' %}" class="link-primary">Sign in</a>
      </div>
    </div>
  </div>
</div>



  <!-- Bootstrap JS -->


</body>

</html>""
