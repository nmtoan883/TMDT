{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Đăng ký - E-ELECTRO{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="glass-card p-5 animate-up">
                <div class="text-center mb-4">
                    <i class="fas fa-user-plus fa-3x text-primary mb-3"></i>
                    <h2 class="fw-bold">Tạo tài khoản</h2>
                    <p class="text-muted">Chỉ mất 1 phút để đăng ký.</p>
                </div>

                <form method="post" action="{% url 'account_signup' %}" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold mt-3">
                        <i class="fas fa-user-plus me-2"></i>ĐĂNG KÝ
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted">
                        Đã có tài khoản?
                        <a href="{% url 'account_login' %}" class="text-primary text-decoration-none fw-bold">
                            Đăng nhập
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
