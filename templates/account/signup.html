{% load static %}
{% load socialaccount %}
{% load crispy_forms_tags %}
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Đăng ký - E-Electro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    body { background-color: #f8f9fc; }
    .card { border: none; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .btn-primary { background-color: #D10024; border-color: #D10024; border-radius: 6px; padding: 10px; font-weight: 600;}
    .btn-primary:hover { background-color: #b4001f; border-color: #b4001f; }
    .link-primary { color: #D10024; text-decoration: none; }
    .link-primary:hover { color: #b4001f; text-decoration: underline; }
    .form-control:focus { border-color: #D10024; box-shadow: 0 0 0 0.25rem rgba(209, 0, 36, 0.25); }
  </style>
</head>
<body>

<div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
  <div class="card" style="max-width:420px; width:100%;">
    <div class="card-body p-5">
      <div class="text-center mb-3">
        <a href="{% url 'core:home' %}" class="mb-4 d-inline-block text-decoration-none">
          <h2 style="color: #D10024; font-weight: 800; margin: 0;">E-ELECTRO</h2>
        </a>
        <h1 class="card-title mb-4 h5 fw-bold text-dark">Tạo tài khoản mới</h1>
      </div>

      <form action="{% url 'account_signup' %}" method="post" class="needs-validation mt-2">
        {% csrf_token %}
        
        {% if form.errors %}
          <div class="alert alert-danger p-2 small mb-3 text-center rounded">
            Vui lòng kiểm tra lại thông tin nhập!
          </div>
        {% endif %}

        {{ form|crispy }}

        <button class="btn btn-primary w-100 mt-4" type="submit">Đăng ký</button>
      </form>

      <div class="text-center mt-4 small text-muted">
        Đã có tài khoản? <a href="{% url 'account_login' %}" class="link-primary fw-bold">Đăng nhập</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
