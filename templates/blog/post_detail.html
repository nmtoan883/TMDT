{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ post.title }}</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="section">
    <div class="container">
        <h1>{{ post.title }}</h1>
        <p><small>{{ post.created_at }}</small></p>
        <hr>
        <div>
            {{ post.content|linebreaks }}
        </div>
    </div>
</div>
</body>
</html>
