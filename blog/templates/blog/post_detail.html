{% extends "base.html" %}
{% load static %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<div class="container my-5">
    <a href="{% url 'blog:post_list' %}" class="btn btn-outline-secondary mb-4">Quay lại</a>

    <article class="mx-auto" style="max-width: 900px;">
        <h1 class="fw-bold mb-3">{{ post.title }}</h1>
        <p class="text-muted mb-4">{{ post.created_at|date:"d/m/Y H:i" }}</p>

        {% if post.image %}
            <img src="{{ post.image.url }}" alt="{{ post.title }}" class="img-fluid rounded mb-4">
        {% endif %}

        <div style="line-height: 1.8;">
            {{ post.content|linebreaks }}
        </div>
    </article>
</div>
{% endblock %}
